version: "3"

tasks:
  setup:
    desc: Install dependencies and local hooks
    cmds:
      - pip install -r requirements.txt -r requirements-dev.txt
      - pre-commit install

  lint:
    desc: Run lint
    cmds:
      - ruff check .

  type:
    desc: Run type checking
    cmds:
      - mypy src

  linkcheck:
    desc: Validate local markdown links
    cmds:
      - python scripts/check_markdown_links.py

  test:
    desc: Run tests with coverage gate
    cmds:
      - pytest

  quality:
    desc: Full local quality gate
    deps: [lint, type, linkcheck, test]

  run:
    desc: Run Streamlit app
    cmds:
      - streamlit run app.py

  run-pipeline:
    desc: Run the official batch pipeline
    cmds:
      - sales-analytics run-pipeline

  data-dictionary:
    desc: Generate the markdown data dictionary from data contracts
    cmds:
      - sales-analytics generate-data-dictionary

  docker-build:
    desc: Build the project container image
    cmds:
      - docker build -t sales-analytics-portfolio .

  docker-smoke-cli:
    desc: Run a CLI smoke test inside the container
    cmds:
      - docker run --rm sales-analytics-portfolio sales-analytics summary
