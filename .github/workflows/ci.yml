name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Run Black check
        run: black --check .

      - name: Run import order check
        run: isort . --check-only

      - name: Run type check
        run: mypy src

      - name: Run markdown link check
        run: python scripts/check_markdown_links.py

      - name: Check version sync
        run: python scripts/check_version_sync.py

      - name: Check changelog structure
        run: python scripts/check_changelog.py

      - name: Run tests
        run: pytest

      - name: Validate package build
        run: python -m build

  container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t sales-analytics-portfolio .

      - name: Smoke test CLI in container
        run: docker run --rm sales-analytics-portfolio sales-analytics summary
